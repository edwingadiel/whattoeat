name: WhatToEat
options:
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.sarasarai.whattoeat
    SWIFT_VERSION: 6.0
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.43.1
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.21.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: 3.24.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: 8.49.0
targets:
  WhatToEat:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: WhatToEat/Support/Debug.xcconfig
      Release: WhatToEat/Support/Release.xcconfig
    sources:
      - path: WhatToEat
        excludes:
          - Resources/restaurant_seed.json
    resources:
      - path: WhatToEat/Resources
    info:
      path: WhatToEat/Support/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleDisplayName: WhatToEat
        LSRequiresIPhoneOS: true
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        REVENUECAT_API_KEY: $(REVENUECAT_API_KEY)
        POSTHOG_API_KEY: $(POSTHOG_API_KEY)
        POSTHOG_HOST: $(POSTHOG_HOST)
        SENTRY_DSN: $(SENTRY_DSN)
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: PostHog
        product: PostHog
      - package: Sentry
        product: Sentry
    settings:
      base:
        TARGETED_DEVICE_FAMILY: 1
        PRODUCT_NAME: WhatToEat
        GENERATE_INFOPLIST_FILE: false
  WhatToEatTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - WhatToEatTests
    dependencies:
      - target: WhatToEat
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.sarasarai.whattoeat.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/WhatToEat.app/WhatToEat
